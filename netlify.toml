[build]
  command = "cd juco-time-source/juco-time && npm install && npm run build"
  publish = "juco-time-source/juco-time/dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Friendly alias for the live wind/tide scraper. Must come before the SPA
# catch-all below, otherwise it gets rewritten to index.html.
[[redirects]]
  from = "/api/portlog"
  to = "/.netlify/functions/portlog"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
