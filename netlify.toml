[build]
  command = "cd juco-time-source/juco-time && npm install && npm run build"
  publish = "juco-time-source/juco-time/dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Friendly path for the Falmouth Docks gauge proxy (must come before the SPA catch-all).
[[redirects]]
  from = "/api/falmouth-tide"
  to = "/.netlify/functions/falmouth-tide"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
